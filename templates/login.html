{% extends 'base.html' %}{% set sidebar=false %}{% block public %}
<div class="relative z-10 min-h-screen grid place-items-center px-4 py-10"><div class="w-full max-w-md glass-card rounded-[2rem] p-8"><a href="/" class="flex items-center gap-3 mb-8"><div class="h-12 w-12 rounded-2xl primary-gradient grid place-items-center"><span class="material-symbols-outlined text-black">lock</span></div><div><h1 class="text-2xl font-black">Welcome back</h1><p class="text-muted text-sm">Login to CareerMate AI</p></div></a>{% if error %}<div class="mb-4 rounded-xl border border-danger/30 bg-red-500/10 text-danger p-3">{{ error }}</div>{% endif %}<form method="POST" action="/login" class="space-y-5"><div><label class="label">Email</label><input class="field" type="email" name="email" placeholder="Enter email" required></div><div><label class="label">Password</label><input class="field" type="password" name="password" placeholder="Enter password" required></div><button class="btn-primary w-full" type="submit">Login <span class="material-symbols-outlined">arrow_forward</span></button></form><p class="text-center text-muted mt-6">New user? <a href="/register" class="text-primary font-bold">Create account</a></p></div></div>
{% endblock %}
