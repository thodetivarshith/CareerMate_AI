{% extends 'base.html' %}{% set active='roadmap' %}{% set page_title='Skill Roadmap Generator' %}{% set eyebrow='Career Growth Planner' %}{% block content %}
<div class="grid lg:grid-cols-3 gap-6"><form method="POST" action="/roadmap" class="glass-card rounded-[2rem] p-7 space-y-5"><h3 class="text-2xl font-black">Generate Roadmap</h3><div><label class="label">Career Goal</label><input class="field" name="goal" placeholder="Example: AI/ML Engineer" required></div><div><label class="label">Current Skills</label><textarea class="field min-h-28" name="skills" placeholder="Python basics, Flask, SQL..."></textarea></div><div><label class="label">Time Period</label><input class="field" name="duration" placeholder="Example: 90 days"></div><button class="btn-primary w-full" type="submit">Generate</button></form><div class="lg:col-span-2 glass-card rounded-[2rem] p-7"><div class="flex items-center justify-between mb-5"><h3 class="text-2xl font-black">Roadmap</h3><div class="flex gap-2"><button onclick="copyResult()" class="btn-secondary py-2">Copy</button><button onclick="downloadResult('ai-result','skill-roadmap.txt')" class="btn-secondary py-2">Download</button></div></div><div id="ai-result" class="result-box">{{ result or roadmap or 'Your roadmap will appear here after generation.' }}</div></div></div>
{% endblock %}
