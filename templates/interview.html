{% extends 'base.html' %}{% set active='interview' %}{% set page_title='Interview Practice' %}{% set eyebrow='Answer Feedback Engine' %}{% block content %}
<div class="grid lg:grid-cols-2 gap-6"><form method="POST" action="/interview" class="glass-card rounded-[2rem] p-7 space-y-5"><h3 class="text-2xl font-black">Practice Setup</h3><div class="grid sm:grid-cols-2 gap-4"><div><label class="label">Role</label><input class="field" name="role" placeholder="AI Intern / Python Developer"></div><div><label class="label">Level</label><select class="field" name="level"><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select></div></div><div><label class="label">Question / Topic</label><input class="field" name="question" placeholder="Tell me about yourself / OOPs / Flask project"></div><div><label class="label">Your Answer</label><textarea class="field min-h-44" name="answer" placeholder="Type your answer here..."></textarea></div><button class="btn-primary w-full" type="submit">Get Feedback</button></form><div class="glass-card rounded-[2rem] p-7"><div class="flex items-center justify-between mb-5"><h3 class="text-2xl font-black">Feedback</h3><button onclick="copyResult()" class="btn-secondary py-2">Copy</button></div><div id="ai-result" class="result-box">{{ result or feedback or 'Your interview feedback will appear here.' }}</div></div></div>
{% endblock %}
