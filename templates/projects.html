{% extends 'base.html' %}{% set active='projects' %}{% set page_title='Project Ideas' %}{% set eyebrow='Portfolio Builder' %}{% block content %}
<div class="grid lg:grid-cols-3 gap-6"><form method="POST" action="/projects" class="glass-card rounded-[2rem] p-7 space-y-5"><h3 class="text-2xl font-black">Find Project Ideas</h3><div><label class="label">Domain</label><input class="field" name="domain" placeholder="AI/ML, Flask, Data Analysis"></div><div><label class="label">Skill Level</label><select class="field" name="level"><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select></div><div><label class="label">Tech Stack</label><input class="field" name="tech_stack" placeholder="Python, Flask, SQLite, Gemini API"></div><button class="btn-primary w-full" type="submit">Generate Ideas</button></form><div class="lg:col-span-2 glass-card rounded-[2rem] p-7"><div class="flex items-center justify-between mb-5"><h3 class="text-2xl font-black">Ideas</h3><div class="flex gap-2"><button onclick="copyResult()" class="btn-secondary py-2">Copy</button><button onclick="downloadResult('ai-result','project-ideas.txt')" class="btn-secondary py-2">Download</button></div></div><div id="ai-result" class="result-box">{{ result or ideas or 'Generated project ideas will appear here.' }}</div></div></div>
{% endblock %}
